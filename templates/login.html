<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banku - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8a3ffc;
            --bg: #f8f7fd;
        }
        body { background: var(--bg); font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 400px; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #1a1d23; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .logo i { color: var(--primary); }
        input { width: 100%; padding: 1rem; margin-bottom: 1rem; border: 1px solid #f0f1f3; border-radius: 12px; outline: none; }
        button { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .footer { margin-top: 1.5rem; font-size: 0.85rem; color: #9ba1ad; }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .error { color: #f56565; margin-bottom: 1rem; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><i class="fas fa-university"></i> Banku</div>
        <h3>Welcome Back</h3>
        <p style="color: #9ba1ad; margin-bottom: 2rem; font-size: 0.9rem;">Please enter your account details</p>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="footer">
            Don't have an account? <a href="/register">Sign Up</a>
        </div>
    </div>
</body>
</html>
